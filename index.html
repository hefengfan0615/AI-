<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HeFengFan写作助手</title>
    <style>
        /* 全局强制黑体加粗、黑色、无倾斜、禁止水平溢出 */
        * {
            box-sizing: border-box;
            font-family: "SimHei", "Heiti SC", "Microsoft YaHei", "Arial Black", sans-serif !important;
            font-weight: 900 !important;
            font-style: normal !important;
            color: #000000 !important;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-light-blue: #d1e9ff; /* 淡蓝色背景 */
            --deep-blue: #004ba0;    /* 深蓝色标题 */
            --gray-btn: #888888;     /* 发送中状态颜色 */
            --border-line: 3px solid #000000;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        html, body {
            background-color: var(--bg-light-blue);
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2vh 4vw;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 2vh;
            animation: fadeInUp 0.8s ease-out;
        }

        /* 修改：移除大写转换 */
        h1 {
            text-align: center;
            color: var(--deep-blue) !important;
            font-size: clamp(24px, 8vw, 42px);
            margin: 1vh 0;
            letter-spacing: 2px;
            /* 已移除：text-transform: uppercase; */
            transition: var(--transition-smooth);
        }

        .input-wrapper {
            background: #ffffff;
            border: var(--border-line);
            border-radius: 16px;
            display: flex;
            align-items: flex-end;
            padding: 12px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.15);
            transition: var(--transition-smooth);
        }

        .input-wrapper:focus-within {
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            transform: translate(-2px, -2px);
        }

        textarea {
            flex: 1;
            height: clamp(80px, 15vh, 200px);
            border: none;
            outline: none;
            background: transparent;
            font-size: clamp(16px, 4.5vw, 22px);
            line-height: 1.5;
            resize: none;
            padding: 5px;
            overflow-y: auto;
        }

        #send-btn {
            background: var(--deep-blue);
            border: 2px solid #000;
            width: clamp(50px, 12vw, 75px);
            height: clamp(50px, 12vw, 75px);
            border-radius: 14px;
            cursor: pointer;
            margin-left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition-smooth);
        }

        #send-btn:hover { background: #003675; }
        #send-btn:active { transform: scale(0.85); }
        #send-btn svg { fill: #ffffff !important; width: 60%; height: 60%; }
        #send-btn.loading { background: var(--gray-btn) !important; cursor: wait; animation: pulse 1.5s infinite; }

        #content-area {
            width: 100%;
            display: none;
            border: var(--border-line);
            border-radius: 16px;
            background: #ffffff;
            overflow: hidden;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            margin-bottom: 5vh;
            animation: fadeInUp 0.6s ease-out;
        }

        details { background: #f1f1f1; border-bottom: 2px solid #000; transition: var(--transition-smooth); }
        
        summary {
            padding: 15px 20px;
            cursor: pointer;
            font-size: clamp(14px, 4vw, 18px);
            background: #e6e6e6;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 自定义下拉图标 */
        summary::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 10px solid #000;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        summary::-webkit-details-marker { display: none; }

        #thinking-box {
            max-height: 25vh;
            padding: 15px;
            font-size: clamp(14px, 3.8vw, 18px);
            line-height: 1.6;
            overflow-y: auto;
            white-space: pre-wrap;
            background: #fafafa;
            border-top: 1px solid #ddd;
        }

        #output-box {
            padding: 20px clamp(15px, 4vw, 30px);
            font-size: clamp(18px, 5vw, 24px);
            line-height: 1.8;
            white-space: pre-wrap;
            display: none;
            background: #ffffff;
            word-wrap: break-word;
        }

        /* 强调文字样式 */
        .highlight-blue {
            color: var(--deep-blue) !important;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #000; border-radius: 4px; }

    </style>
</head>
<body>

<div class="container">
    <!-- 标题保持自然大小写 -->
    <h1 id="app-title">HeFengFan 写作助手</h1>

    <div class="input-wrapper">
        <textarea id="user-input" placeholder="请输入作文题目或写作要求..."></textarea>
        <button id="send-btn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <div id="content-area">
        <details id="think-detail" open>
            <summary>深度思考</summary>
            <div id="thinking-box"></div>
        </details>
        <div id="output-box"></div>
    </div>
</div>

<script>
    const API_KEY = "fc80f21aacec4c598a72083e12b40b20.2dIFUpz4QwZu4ojg";
    const API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";

    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const contentArea = document.getElementById('content-area');
    const thinkingBox = document.getElementById('thinking-box');
    const outputBox = document.getElementById('output-box');
    const thinkDetail = document.getElementById('think-detail');

    const SYSTEM_PROMPT = `你是资深的名字为HeFengFan的【矛盾问题解构法】写作大师。你必须严格遵守以下方面进行思考和输出：
【审题】：
1.切合材料语境限制，务必对题干的所有关键词和要点进行核心拆解
2.材料出现多个对象→往调和矛盾方面思考：挖掘对象底层的共性，分析其内部逻辑关联，并结合时代背景给出具备启发性的价值选择；如果是单个对象→词语切割+翻译重构！
3.概念围栏法+逆向验证："材料核心是讨论xxx，写作的核心应该是xxx，而非xxx，因为材料中特别强调xxx"
4.整体评论：对材料涉及的内容都要进行评价，并在评价过程中凸显逻辑和选择或者倾向
5.构建材料内部关联，内部转化，内部矛盾，结合材料和审题形成带有思辨的写作逻辑思考链

【矛盾问题解构法】：
先想痛点（先上车），再拆原理（再补票）！→必要性思维+终局思维+销售思维
1.终局思维：联系当下青年，必须思考启发角度！
2.必要性思维：防止你的作文写泛！→痛点出发！
A类：核心痛点——是“不愿意”，而不是“做不到”!
暗示痛点问题，但不给做法——重点在解法（给出方法论）→新任务驱动类作文
（世界观→痛点原理）+（方法论How）模式
B类：核心痛点——是“做不到”，而不是“不愿意”!
给做法（单一做法或二元做法），不给痛点——重点在启发，生成结论
（世界观→痛点+需求）+（方法论How→巩固论证）模式|（需要区分材料模型！）

【写作前注意事项】：
1.解决问题是议论文的第一要务：所有的理由，都是来自“解决痛点”！
思路：不要正着往后思考！而是必须从痛点倒通！
记住2个思考抓手：解决痛点（必要性原则）→达到终极目标（启发原则）
只有3种启发角度（三种终极目标）：“生存观|心力观|幸福观”
生存观：活下去是第一优先级，提供创造价值
幸福观：可控的自由，繁荣，存在感
心力观：有能力去追求“生存和幸福”，而非摆烂
2.只解决问题，明确“算法”，不做是非、对错、功过、道德评价！
不要追求绝对正义和绝对真理！

【正式写作要求】：
1. 开头：描述材料，发现问题。进行审题后亮出的总论点，亮出“世界观”（150字以内）
2. 中间段：严格根据材料内容需要展开的部分进行概括描述并给出分论点（分论点的构成必须在这些元素进行多种元素选择：概念特征，原因解释，重要性解读，具体措施，结果预期，添加高级词汇明确重述），接着进行分论点的阐释，然后举例（古今中外均可，每段至少2个以上，要有感染力和说服力），最后对分论点进行概括总结（每段至少200字）
3. 结尾：呼应，给出“方法论”（150字以内）
4. 注意句子与句子之间的用词，使文章流畅，吸引读者
5. 矛盾问题解构法提供是写作思路和方向，矛盾问题解构法相关词语不能出现在作文中！
6. 段落与段落之间存在要明显逻辑关联，都是在根据材料解决问题，过渡自然，体现思辨！
7. 要符合高中生身份写作，内容不能空谈，要贴合生活，表达要流畅生动，不要当哲学家！

【写作评分准则】：
满分60分
（一）内容（20分）
切合题意，包含所有关键点，中心突出，内容充实，思想健康，感情真挚。
（二）表达（20分）
符合文体要求，结构严谨，语言流畅，有感染力，引发共鸣。
（三）发展等级（共20分）
依据以下特征中的突出点按等给分：
1.  深刻：透过现象深入本质，揭示事物内在因果关系，观点具有启发性。
2.  丰富：材料丰富、翔实，形象丰满，意境深远。
3.  有文采：用词贴切，句式灵活，表达生动，善用修辞，文句有表现力。
4.  有创意：见解新颖，材料新鲜，构思新巧，推理想象有独到之处。
评分与扣分说明：
1.  “内容”与“表达”与“发展”三项分别评等，综合定分。
2.  不跨等给分原则：发展和表达等级得分受内容等级制约，三者最高分差必须在三分以内。
3.  扣分项：
缺标题：扣2分。
字数不足：每少50字扣1分。明显未完篇且字数严重不足者，总分将受严重影响。
错别字：每1个扣1分，重复不计，上不封顶。

【输出格式要求】（严禁改变此顺序）：
1. 作文分析：此材料是在考察xxx，同时还要求考生在遇到xxx能够xxx。

2. 立意分档：55+分立意:xxx 
50-54分立意:xxx 
45-49分立意:xxx。

3. 范文评分：（内容分）+（表达分）+（发展分）= 总分。

4. 范文评价：阅卷人对考生文章的整体评价。

5. 脉络解析：根据材料，以通俗易懂的方式逐段讲解该段的论点是怎么通过矛盾问题结构法得出的，并谈展开的思路。

6. 完整范文：根据总体分析，最后输出一篇850-900字左右的高质量满分或极接近满分的范文。`;

    // 改进的格式化函数：处理 * 或 # 符号包裹的内容
    function formatRichText(text) {
        // 先对 HTML 字符进行基本转义防止注入
        let escaped = text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        
        // 处理换行符，确保保留换行
        escaped = escaped.replace(/\n/g, '<br>');
        
        // 处理加粗和斜体标记：**text** 或 *text*
        // 先处理三个及以上的相同符号
        escaped = escaped.replace(/([*#]{3,})(.*?)\1/g, (match, symbols, content) => {
            return `<span class="highlight-blue">${content}</span>`;
        });
        
        // 处理两个相同符号：**text** 或 ##text##
        escaped = escaped.replace(/([*#]{2})(.*?)\1/g, (match, symbols, content) => {
            return `<span class="highlight-blue">${content}</span>`;
        });
        
        // 处理单个符号：*text* 或 #text#
        escaped = escaped.replace(/([*#])(.*?)\1/g, (match, symbol, content) => {
            return `<span class="highlight-blue">${content}</span>`;
        });
        
        return escaped;
    }

    function isElementAtBottom(el) {
        return (el.scrollHeight - el.scrollTop) <= (el.clientHeight + 50);
    }

    function isWindowAtBottom() {
        return (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 80);
    }

    async function handleSend() {
        const prompt = userInput.value.trim();
        if (!prompt) return;

        sendBtn.disabled = true;
        sendBtn.classList.add('loading');
        thinkingBox.innerHTML = "正在思考...";
        outputBox.innerHTML = "";
        outputBox.style.display = "none";
        contentArea.style.display = "block";
        thinkDetail.open = true;

        let fullContent = "";
        let fullThinking = "";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "glm-4.7-flash",
                    messages: [
                        { role: "system", content: SYSTEM_PROMPT },
                        { role: "user", content: prompt }
                    ],
                    stream: true
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        if (line.includes('[DONE]')) break;
                        try {
                            const data = JSON.parse(line.slice(6));
                            const delta = data.choices[0].delta;

                            if (delta.reasoning_content) {
                                const shouldScroll = isElementAtBottom(thinkingBox);
                                fullThinking += delta.reasoning_content;
                                thinkingBox.innerHTML = formatRichText(fullThinking);
                                if (shouldScroll) thinkingBox.scrollTop = thinkingBox.scrollHeight;
                            }

                            if (delta.content) {
                                if (outputBox.style.display === "none") {
                                    outputBox.style.display = "block";
                                    // 当正式内容开始输出且思考内容已有一定长度时，自动收起思考框
                                    if(fullThinking.length > 20) thinkDetail.open = false;
                                }
                            
                                const shouldScroll = isWindowAtBottom();
                                fullContent += delta.content;
                                outputBox.innerHTML = formatRichText(fullContent);
                            
                                if (shouldScroll) {
                                    window.scrollTo({
                                        top: document.documentElement.scrollHeight,
                                        behavior: 'smooth'
                                    });
                                }
                            }
                        } catch (e) {}
                    }
                }
            }
        } catch (err) {
            outputBox.style.display = "block";
            outputBox.innerHTML = "抱歉，系统响应异常，请稍后再试。错误信息：" + err.message;
        } finally {
            sendBtn.disabled = false;
            sendBtn.classList.remove('loading');
        }
    }

    sendBtn.addEventListener('click', handleSend);

    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });
</script>

</body>
</html>
