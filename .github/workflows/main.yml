name: Build EXE and Release

# 解决 Node.js 20 弃用警告，强制工作流内的 Actions 提前采用 Node 24 运行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - 'v*'                 # 推送 v1.0 等标签时自动触发
  workflow_dispatch:          # 手动触发，可输入版本号
    inputs:
      version:
        description: '版本号 (例如 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest   # 保持不变，6月中旬会自动平滑过渡到新系统
    permissions:
      contents: write         # 允许推送标签、创建 Release、上传文件

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 获取完整历史，以便打标签

      - name: 如果是手动触发，创建并推送标签
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pyinstaller

      - name: 打包 Sam.exe (main.py)
        run: |
          pyinstaller --onefile --windowed --name Sam main.py

      - name: 打包 Walmart.exe (main1.py)
        run: |
          pyinstaller --onefile --windowed --name Walmart main1.py

      - name: 上传构建产物（供 Actions 页面下载）
        uses: actions/upload-artifact@v4
        with:
          name: EXE-files
          path: |
            dist/Sam.exe
            dist/Walmart.exe

      - name: 发布 Release 并上传 exe
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', inputs.version) }}
          files: |
            dist/Sam.exe
            dist/Walmart.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
