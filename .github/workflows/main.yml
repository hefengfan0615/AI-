name: Build EXE and Release

on:
  push:
    tags:
      - 'v*'               # 推送 v1.0 等标签时自动触发
  workflow_dispatch:        # 也可在 GitHub 网页上手动运行

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write       # 允许创建 Release 和上传文件

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pyinstaller

      - name: 使用 PyInstaller 打包为单个 exe
        run: |
          pyinstaller --onefile --windowed --name SamSalesAnalyzer main.py

      - name: 上传构建产物（供手动运行下载）
        uses: actions/upload-artifact@v4
        with:
          name: SamSalesAnalyzer-exe
          path: dist/SamSalesAnalyzer.exe

      - name: 发布 Release 并上传 exe
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SamSalesAnalyzer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
